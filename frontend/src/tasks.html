<!DOCTYPE html>
<html lang ="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Task 2 - Login Users</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Lora:ital,wght@0,400..700;1,400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="../style/tasks.css"/>
        <link rel="stylesheet" href="../style/auth.css"/>
 
    </head>
    
    <body>
        <div class="page-wrapper">

            <div id="layout" class="layout">

                <!-- TASK LIST CARD -->
                <div class="panel task-panel-main">
                    <div class="panel-header">
                        <div class="logo">To-Do List:</div>
                        <button class="add-btn" onclick="openPanel()">＋</button>
                    </div>
                    <div class="divider">
                        <span class="divider-line"></span>
                        <span class="divider-dot"></span>
                        <span class="divider-star">✦</span>
                        <span class="divider-dot"></span>
                        <span class="divider-line"></span>
                    </div>

                    <label>Filters</label>
                    <div class="filters">
                        <label for="filter-status" class="sr-only">Filter by status</label>
                        <select id="filter-status" onchange="loadTasks()">
                            <option value="">All</option>
                            <option value="pending">Pending</option>
                            <option value="in_progress">In Progress</option>
                            <option value="done">Done</option>
                        </select>
                        <label for="filter-date" class="sr-only">Filter by date</label>
                        <input type="date" id="filter-date" onchange="loadTasks()">
                    </div>

                    <div id="task-list" class="task-list"></div>
                </div>

                <!-- NEW TASK CARD -->
                <div id="create-panel" class="panel create-panel">
                        <div class="logo" id="panel-title">New Task</div>

                        <div class="inputs">
                            <div class="field">
                                <label>Task Title</label>
                                <input id="task-title" placeholder="Task Title"/>
                            </div>

                            <div class="field">
                                <label>Description</label>
                                <input id="task-desc" placeholder="Task Description *optional"/>
                            </div>

                            <div class="field">
                                <label for="task-status">Status</label>
                                <select id="task-status">
                                    <option value="pending">Pending</option>
                                    <option value="in_progress">In Progress</option>
                                    <option value="done">Done</option>
                                </select>
                            </div>

                            <div class="field">
                                <label>Due Date</label>
                                <input type="date" id="task-date" placeholder="Due Date"/>
                            </div>
                        </div>

                        <div id="auth-error" class="auth-error"></div>
                        <div id="auth-success" class="auth-success"></div>

                        <!-- Task Buttons -->
                        <div class="btn-group">
                            <button id="submit-btn" class="submit-btn" onclick="createTask()">Add Task</button>
                            <button class="submit-btn" onclick="closePanel()">Cancel</button>
                        </div>
                </div>
            </div>
        </div>

        <script src="tasks.js"></script>
    </body>
</html>
