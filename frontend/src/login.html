<!DOCTYPE html>
<html lang ="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Task 2 - Login Users</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Lora:ital,wght@0,400..700;1,400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="../style/auth.css"/>
    </head>

    <body>
        <div class="auth-screen">
            <div class="logo">NAVIRA</div>
            <div class="reg-text">Welcome back. Please log in to continue.</div>
            
            <div class="inputs">
                <div class="field">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="user@example.com" autocomplete="email"/>
                </div>
                <div class="field">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="- - - - - - - - - - - -" autocomplete="current-password"/>
                </div>
            </div>

            <button class="submit-btn" id="login-btn" onclick="handleLogin()">Log In</button>

            <div class="auth-error" id="auth-error"></div>
            <div class="auth-success" id="auth-success"></div>

            <div class="auth-footer">Don't have an account? <a href="register.html">Register</a></div>
            
            <div class="divider">
                <span class="divider-line"></span>
                <span class="divider-dot"></span>
                <span class="divider-star">✦</span>
                <span class="divider-dot"></span>
                <span class="divider-line"></span>
            </div>

            <script src="login.js"></script>
            
        </div>
    </body>
</html>
